<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AS Store | Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="checkout-page">
    <main class="container py-4 py-md-5 min-vh-100 d-flex align-items-center justify-content-center auth-shell">
        <section class="auth-card card border-0 shadow-lg w-100 auth-panel checkout-panel">
            <div class="card-body p-4 p-md-5">
                <div class="auth-brand-wrap text-center mb-3">
                    <a href="index.html" class="auth-brand text-decoration-none"><span class="brand-mark">AS</span> STORE</a>
                </div>
                <div class="checkout-header mb-4">
                    <span class="auth-kicker"><i class="bi bi-credit-card me-2"></i>Secure Checkout</span>
                    <h1 class="h3 fw-bold mb-2 auth-title">Ready To Place Your Order</h1>
                    <p class="text-muted mb-0">Signed in as <span id="checkoutUser" class="fw-semibold"></span></p>
                    <div class="auth-highlights d-flex flex-wrap justify-content-center gap-2 mt-3">
                        <span class="auth-highlight"><i class="bi bi-patch-check-fill me-1"></i>Trusted Checkout</span>
                        <span class="auth-highlight"><i class="bi bi-box-seam me-1"></i>Quick Delivery</span>
                        <span class="auth-highlight"><i class="bi bi-arrow-repeat me-1"></i>Easy Returns</span>
                    </div>
                </div>

                <div class="checkout-summary card border-0 mb-4">
                    <div class="card-body">
                        <p class="mb-2 fw-semibold"><i class="bi bi-lock me-2"></i>Your payment flow is protected.</p>
                        <small class="text-muted">Tap place order when you are ready. You can still return to your cart.</small>
                    </div>
                </div>

                <div class="d-grid gap-2 checkout-actions">
                    <button id="placeOrderBtn" class="btn btn-dark py-2 auth-submit-btn">
                        <i class="bi bi-bag-check me-2"></i>Place Order
                    </button>
                    <a href="index.html" class="btn btn-outline-secondary checkout-back-btn">
                        <i class="bi bi-arrow-left me-2"></i>Back to Cart
                    </a>
                    <button id="logoutBtn" class="btn btn-link text-danger text-decoration-none checkout-logout-btn">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </div>

                <div class="alert alert-success mt-4 d-none auth-alert" id="orderSuccess" role="alert">
                    <i class="bi bi-check-circle me-2"></i>Order placed successfully.
                </div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="checkout.js"></script>
</body>

</html>
