<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AS Store | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <main class="container py-4 py-md-5 min-vh-100 d-flex align-items-center justify-content-center auth-shell">
        <section class="auth-card card border-0 shadow-lg w-100 auth-panel">
            <div class="card-body p-4 p-md-5">
                <div class="auth-brand-wrap text-center mb-3">
                    <a href="index.html" class="auth-brand text-decoration-none"><span class="brand-mark">AS</span> STORE</a>
                </div>
                <div class="text-center mb-4 auth-header">
                    <span class="auth-kicker"><i class="bi bi-shield-lock me-2"></i>Secure Access</span>
                    <h1 class="h3 fw-bold mb-2 auth-title">Welcome Back</h1>
                    <p class="text-muted mb-0 auth-subtitle">Sign in to continue to checkout and manage your cart.</p>
                    <div class="auth-highlights d-flex flex-wrap justify-content-center gap-2 mt-3">
                        <span class="auth-highlight"><i class="bi bi-lightning-charge-fill me-1"></i>Fast Checkout</span>
                        <span class="auth-highlight"><i class="bi bi-shield-check me-1"></i>Secure Session</span>
                        <span class="auth-highlight"><i class="bi bi-stars me-1"></i>Premium Picks</span>
                    </div>
                </div>

                <div class="alert alert-danger d-none auth-alert" id="loginError" role="alert"></div>

                <form id="loginForm" novalidate>
                    <div class="mb-3 auth-field">
                        <label for="email" class="form-label fw-semibold">Email address</label>
                        <div class="input-group auth-input-group">
                            <span class="input-group-text border-0"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control form-control-lg border-0" id="email"
                                placeholder="name@example.com" autocomplete="email" required>
                        </div>
                    </div>

                    <div class="mb-3 auth-field">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <div class="input-group auth-input-group">
                            <span class="input-group-text border-0"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control form-control-lg border-0" id="password"
                                placeholder="Enter your password" autocomplete="current-password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-2 auth-submit-btn">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <a href="index.html" class="btn btn-link w-100 mt-3 text-decoration-none text-dark auth-back-link">
                    <i class="bi bi-arrow-left me-1"></i> Back to Home
                </a>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>

</html>
