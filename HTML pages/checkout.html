<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS Store | Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href=".\Styles\style.css">
</head>

<body class="checkout-page">
    <main class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
        <div class="auth-card card border-0 shadow-lg w-100">
            <div class="card-body p-4 p-md-5">
                <h1 class="h3 fw-bold mb-3">Checkout</h1>
                <p class="text-muted mb-4">Signed in as: <span id="checkoutUser" class="fw-semibold"></span></p>
                <div class="d-grid gap-2">
                    <button id="placeOrderBtn" class="btn btn-dark py-2">Place Order</button>
                    <a href="index.html" class="btn btn-outline-secondary">Back to Cart</a>
                    <button id="logoutBtn" class="btn btn-link text-danger text-decoration-none">Logout</button>
                </div>
                <div class="alert alert-success mt-4 d-none" id="orderSuccess" role="alert">
                    Order placed successfully.
                </div>
            </div>
        </div>
    </main>

    <script src=".\JavaScript files\auth.js"></script>
    <script src=".\JavaScript files\checkout.js"></script>
</body>

</html>
