<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS Store | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href=".\Styles\style.css">
</head>

<body class="login-page">
    <main class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
        <div class="auth-card card border-0 shadow-lg w-100">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold mb-2">AS Store Login</h1>
                    <p class="text-muted mb-0">Sign in to continue to checkout</p>
                </div>

                <div class="alert alert-danger d-none" id="loginError" role="alert"></div>

                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control form-control-lg" id="email" placeholder="name@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login
                    </button>
                </form>

                <a href="index.html" class="btn btn-link w-100 mt-3 text-decoration-none text-dark">
                    Back to Home
                </a>
            </div>
        </div>
    </main>

    <script src="./JavaScript files/auth.js"></script>
    <script src="./JavaScript files/login.js"></script>
</body>

</html>
